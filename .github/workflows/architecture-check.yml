name: Architecture check

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'scripts/check_architecture.sh'

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run architecture greps
        run: bash scripts/check_architecture.sh origin/${{ github.base_ref }}
